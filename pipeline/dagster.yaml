# Dagster configuration for Sensor Data Pipeline
run_storage:
  sqlite:
    base_dir: /app/dagster_home/runs

event_log_storage:
  sqlite:
    base_dir: /app/dagster_home/storage

compute_logs:
  module: dagster.core.storage.local_compute_log_manager
  class: LocalComputeLogManager
  config:
    base_dir: /app/dagster_home/logs

schedule_storage:
  sqlite:
    base_dir: /app/dagster_home/schedules

# Server configuration
server:
  host: 0.0.0.0
  port: 3000
